services:
  reminder-bot:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: sqlite:///./data/reminders.db
    volumes:
      - ../../logs:/app/logs
      - ../../backups:/app/backups
      - ../../data:/app/data
    ports:
      - "8088:8088"
    restart: unless-stopped
